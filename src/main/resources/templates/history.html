<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment History - JalDhara</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0077b6, #005f8a); padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: white; }
        .btn { background: #00c896; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: 600; }
        .btn:hover { background: #00a676; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 10px 40px rgba(0,119,182,0.15); }
        .stat-card h3 { color: #0077b6; font-size: 2rem; }
        .stat-card p { color: #636e72; }
        .history-table { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 40px rgba(0,119,182,0.15); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #dfe6e9; }
        th { background: #0077b6; color: white; }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        tr:hover { background: #f0f8ff; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .empty { text-align: center; padding: 50px; color: #636e72; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Assessment History</h1>
            <a href="/" class="btn">← Back to Home</a>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalAssessments">0</h3>
                <p>Total Assessments</p>
            </div>
            <div class="stat-card">
                <h3 id="feasibleCount">0</h3>
                <p>Feasible</p>
            </div>
            <div class="stat-card">
                <h3 id="totalWater">0 KL</h3>
                <p>Total Water Saved</p>
            </div>
        </div>

        <div class="history-table">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Roof Area</th>
                        <th>Runoff (KL)</th>
                        <th>Structure</th>
                        <th>Cost (₹)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTable">
                    <tr><td colspan="8" class="empty">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        fetch('/api/history')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('historyTable');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty">No assessments yet. Go to home page to create one!</td></tr>';
                    return;
                }
                
                let feasibleCount = 0;
                let totalWater = 0;
                
                data.forEach(item => {
                    if (item.isFeasible) feasibleCount++;
                    totalWater += item.runoffGenerated || 0;
                });
                
                document.getElementById('totalAssessments').textContent = data.length;
                document.getElementById('feasibleCount').textContent = feasibleCount;
                document.getElementById('totalWater').textContent = totalWater.toFixed(1) + ' KL';
                
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.createdAt ? new Date(item.createdAt).toLocaleDateString() : 'N/A'}</td>
                        <td>${item.userName || 'Unknown'}</td>
                        <td>${item.district}, ${item.state}</td>
                        <td>${item.roofArea || 0} m²</td>
                        <td>${(item.runoffGenerated || 0).toFixed(2)}</td>
                        <td>${item.recommendedStructure || 'N/A'}</td>
                        <td>₹${(item.totalCost || 0).toLocaleString()}</td>
                        <td><span class="badge ${item.isFeasible ? 'badge-success' : 'badge-warning'}">${item.isFeasible ? 'Feasible' : 'Moderate'}</span></td>
                    </tr>
                `).join('');
            })
            .catch(err => {
                document.getElementById('historyTable').innerHTML = '<tr><td colspan="8" class="empty">Error loading data</td></tr>';
            });
    </script>
</body>
</html>
